services:
  # ─── System DB ──────────────────────────────────────────────────────────────
  system-db:
    image: postgres:16-alpine
    container_name: foxai-system-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SYSTEM_DB_USER}
      POSTGRES_PASSWORD: ${SYSTEM_DB_PASSWORD}
      POSTGRES_DB: ${SYSTEM_DB_NAME}
    volumes:
      - system_db_data:/var/lib/postgresql/data
    networks:
      - foxai-internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${SYSTEM_DB_USER} -d ${SYSTEM_DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── OCR DB (pgvector) ──────────────────────────────────────────────────────
  ocr-db:
    image: pgvector/pgvector:pg16
    container_name: foxai-ocr-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${OCR_DB_USER}
      POSTGRES_PASSWORD: ${OCR_DB_PASSWORD}
      POSTGRES_DB: ${OCR_DB_NAME}
    volumes:
      - ocr_db_data:/var/lib/postgresql/data
      - ./scripts/init-ocr-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - foxai-internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${OCR_DB_USER} -d ${OCR_DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Chatbot DB (pgvector) ──────────────────────────────────────────────────
  chatbot-db:
    image: pgvector/pgvector:pg16
    container_name: foxai-chatbot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${CHATBOT_DB_USER}
      POSTGRES_PASSWORD: ${CHATBOT_DB_PASSWORD}
      POSTGRES_DB: ${CHATBOT_DB_NAME}
    volumes:
      - chatbot_db_data:/var/lib/postgresql/data
      - ./scripts/init-chatbot-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - foxai-internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${CHATBOT_DB_USER} -d ${CHATBOT_DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Index DB ───────────────────────────────────────────────────────────────
  index-db:
    image: postgres:17.0-alpine
    container_name: foxai-index-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${INDEX_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${INDEX_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${INDEX_DB_NAME:-index_py_db}
    volumes:
      - index_db_data:/var/lib/postgresql/data
    networks:
      - foxai-internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${INDEX_DB_USER:-postgres} -d ${INDEX_DB_NAME:-index_py_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Knowledge DB ───────────────────────────────────────────────────────────
  knowledge-db:
    image: postgres:16-alpine
    container_name: foxai-knowledge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${KNOWLEDGE_DB_USER}
      POSTGRES_PASSWORD: ${KNOWLEDGE_DB_PASSWORD}
      POSTGRES_DB: ${KNOWLEDGE_DB_NAME}
    volumes:
      - knowledge_db_data:/var/lib/postgresql/data
    networks:
      - foxai-internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${KNOWLEDGE_DB_USER} -d ${KNOWLEDGE_DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── System Service (.NET 9 + gRPC) ─────────────────────────────────────────
  system-service:
    build:
      context: .
      dockerfile: apps/system-service/Dockerfile
    image: foxai-system-service:latest
    container_name: foxai-system-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      SYSTEM_DATABASE_URL: postgresql://${SYSTEM_DB_USER}:${SYSTEM_DB_PASSWORD}@system-db:5432/${SYSTEM_DB_NAME}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: foxai-system-service
      Jwt__Audience: foxai-platform
      Jwt__ExpiresIn: ${JWT_EXPIRES_IN:-7d}
      GRPC_PORT: '50051'
      HTTP_PORT: '3002'
      SYSTEM_SERVICE_AUTOMIGRATE: 'true'
      SYSTEM_SERVICE_SEED: 'true'
      SYSTEM_SERVICE_SEED_DEMO: 'true'
    networks:
      - foxai-internal
    depends_on:
      system-db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:3002/health']
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ─── Knowledge Service (.NET 9 + gRPC) ──────────────────────────────────────
  knowledge-service:
    build:
      context: .
      dockerfile: apps/knowledge-service/Dockerfile
    image: foxai-knowledge-service:latest
    container_name: foxai-knowledge-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      KNOWLEDGE_DATABASE_URL: postgresql://${KNOWLEDGE_DB_USER}:${KNOWLEDGE_DB_PASSWORD}@knowledge-db:5432/${KNOWLEDGE_DB_NAME}
      GRPC_PORT: '50052'
      HTTP_PORT: '3005'
      KNOWLEDGE_SERVICE_AUTOMIGRATE: 'true'
      KNOWLEDGE_SERVICE_SEED: 'true'
      INDEX_SERVICE_URL: ${INDEX_SERVICE_URL}
      FILE_BASE_URL_INTERNAL: http://api-gateway:3001
    networks:
      - foxai-internal
    depends_on:
      knowledge-db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:3005/health']
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ─── OCR API (HTTP server + job producer) ───────────────────────────────────
  ocr-api:
    build:
      context: .
      dockerfile: apps/ocr-service/Dockerfile
    image: foxai-ocr-service:latest
    container_name: foxai-ocr-api
    restart: unless-stopped
    environment:
      APP_MODE: api
      NODE_ENV: production
      OCR_SERVICE_PORT: 3003
      OCR_DATABASE_URL: postgresql://${OCR_DB_USER}:${OCR_DB_PASSWORD}@ocr-db:5432/${OCR_DB_NAME}
      REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      BULLMQ_PREFIX: ocr
      OCR_PROVIDER: ${OCR_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      WORKER_CONCURRENCY: 3
      UPLOAD_DIR: /app/apps/ocr-service/uploads
    volumes:
      - ocr_uploads:/app/apps/ocr-service/uploads
    networks:
      - foxai-internal
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      ocr-db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:3003/health']
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ─── OCR Workers (job consumers, no HTTP) ────────────────────────────────────
  ocr-worker:
    build:
      context: .
      dockerfile: apps/ocr-service/Dockerfile
    image: foxai-ocr-service:latest
    restart: unless-stopped
    environment:
      APP_MODE: worker
      NODE_ENV: production
      OCR_DATABASE_URL: postgresql://${OCR_DB_USER}:${OCR_DB_PASSWORD}@ocr-db:5432/${OCR_DB_NAME}
      REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      BULLMQ_PREFIX: ocr
      OCR_PROVIDER: ${OCR_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      WORKER_CONCURRENCY: 15
      UPLOAD_DIR: /app/apps/ocr-service/uploads
    volumes:
      - ocr_uploads:/app/apps/ocr-service/uploads
    networks:
      - foxai-internal
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      ocr-db:
        condition: service_healthy
    deploy:
      replicas: 2

  # ─── Chatbot Service (Python) ────────────────────────────────────────────────
  chatbot-service:
    build:
      context: apps/chatbot-service
      dockerfile: Dockerfile
    image: foxai-chatbot-service:latest
    container_name: foxai-chatbot-service
    restart: unless-stopped
    environment:
      # PostgreSQL (dùng __ để pydantic-settings nested)
      POSTGRES__USERNAME: ${CHATBOT_DB_USER}
      POSTGRES__PASSWORD: ${CHATBOT_DB_PASSWORD}
      POSTGRES__HOST: chatbot-db
      POSTGRES__DB: ${CHATBOT_DB_NAME}
      POSTGRES__PORT: 5432
      # Redis
      REDIS__HOST: ${REDIS_HOST:-host.docker.internal}
      REDIS__PORT: ${REDIS_PORT:-6379}
      REDIS__PASSWORD: ${REDIS_PASSWORD:-}
      # OpenAI
      OPENAI__API_KEY: ${OPENAI_API_KEY}
      # Qdrant vector store
      QDRANT__HOST: ${QDRANT_HOST}
      QDRANT__COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-foxai}
      QDRANT__API_KEY: ${QDRANT_API_KEY:-}
      # Service URLs
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      INDEX_SERVICE_URL: ${INDEX_SERVICE_URL}
      QUERY_SERVICE_URL: ${QUERY_SERVICE_URL}
      # Security
      SECURITY__SECRET_KEY: ${JWT_SECRET}
    networks:
      - foxai-internal
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      chatbot-db:
        condition: service_healthy

  # ─── MinIO (S3-compatible object storage) ───────────────────────────────────
  minio:
    image: quay.io/minio/minio:latest
    container_name: foxai-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_password}
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    networks:
      - foxai-internal
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Qdrant (vector DB) ─────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: foxai-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - foxai-internal

  # ─── Index Migration Runner ─────────────────────────────────────────────────
  index-py-migration:
    build:
      context: apps/index-service
      dockerfile: Dockerfile.migration
    container_name: foxai-index-py-migration
    restart: 'no'
    environment:
      POSTGRES__HOST: index-db
      POSTGRES__PORT: 5432
      POSTGRES__USERNAME: ${INDEX_DB_USER:-postgres}
      POSTGRES__PASSWORD: ${INDEX_DB_PASSWORD:-postgres}
      POSTGRES__DB: ${INDEX_DB_NAME:-index_py_db}
    networks:
      - foxai-internal
    depends_on:
      index-db:
        condition: service_healthy

  # ─── Index Service (Python/FastAPI) ─────────────────────────────────────────
  index-service:
    build:
      context: apps/index-service
      dockerfile: Dockerfile
    image: foxai-index-service:latest
    container_name: foxai-index-service
    restart: unless-stopped
    environment:
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: foxai-system-service
      JWT_AUDIENCE: foxai-platform
      ROOT_PATH: /api/index
      AUTH_SERVICE_URL: http://api-gateway:3001
      # PostgreSQL
      POSTGRES__HOST: index-db
      POSTGRES__PORT: 5432
      POSTGRES__USERNAME: ${INDEX_DB_USER:-postgres}
      POSTGRES__PASSWORD: ${INDEX_DB_PASSWORD:-postgres}
      POSTGRES__DB: ${INDEX_DB_NAME:-index_py_db}
      # FoxAI LLM (required)
      FOXAILLM__API_KEY: ${FOXAILLM_API_KEY}
      FOXAILLM__BASE_URL: ${FOXAILLM_BASE_URL}
      # MinIO (required)
      MINIO__HOST: minio:9000
      MINIO__USERNAME: ${MINIO_ROOT_USER:-minio}
      MINIO__PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_password}
      MINIO__PUBLIC_URL_BASE: ${MINIO_PUBLIC_URL_BASE}
      # Qdrant (required)
      QDRANT__HOST: ${QDRANT_HOST}
      QDRANT__COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-foxai}
      QDRANT__API_KEY: ${QDRANT_API_KEY:-}
      # Redis
      REDIS__HOST: ${REDIS_HOST:-host.docker.internal}
      REDIS__PORT: ${REDIS_PORT:-6379}
      REDIS__PASSWORD: ${REDIS_PASSWORD:-}
      # LLM providers (set real keys for providers you use; empty = disabled)
      GEMINI__API_KEY: ${GEMINI_API_KEY:-}
      OPENAI__API_KEY: ${OPENAI_API_KEY:-}
      CLAUDE__API_KEY: ${CLAUDE_API_KEY:-}
      # Trigger section construction so pydantic sees these sections as present
      CONVERTER__IMAGES_SCALE: '1.0'
      CHUNKER__MAX_TOKENS: '500'
      SECURITY__ALGORITHM: HS256
      KEYCLOAK__BASE_URL: ''
    networks:
      - foxai-internal
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      index-db:
        condition: service_healthy
      index-py-migration:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started

  # ─── API Gateway (NestJS) ────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    image: foxai-api-gateway:latest
    container_name: foxai-api-gateway
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      API_GATEWAY_PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SYSTEM_SERVICE_GRPC_URL: system-service:50051
      KNOWLEDGE_SERVICE_GRPC_URL: knowledge-service:50052
      OCR_SERVICE_URL: http://ocr-api:3003
      CHATBOT_SERVICE_URL: chatbot-service:8000
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3001}
      REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - foxai-internal
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      system-service:
        condition: service_healthy
      knowledge-service:
        condition: service_healthy
      ocr-api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:3001/health']
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ─── Web Portal (Next.js) ────────────────────────────────────────────────────
  web-portal:
    build:
      context: .
      dockerfile: apps/web-portal/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    image: foxai-web-portal:latest
    container_name: foxai-web-portal
    restart: unless-stopped
    ports:
      - '8082:3000'
    environment:
      NODE_ENV: production
    networks:
      - foxai-internal
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  system_db_data:
  ocr_db_data:
  chatbot_db_data:
  knowledge_db_data:
  index_db_data:
  ocr_uploads:
  minio_data:
  qdrant_data:

networks:
  foxai-internal:
    driver: bridge
