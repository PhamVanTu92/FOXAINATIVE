services:
  # ─── Redis (BullMQ) ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: foxai-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── System DB (Postgres dành cho system-service .NET) ──────────────────────
  system-db:
    image: postgres:17.0-alpine
    container_name: foxai-system-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: system_db
      TZ: Asia/Ho_Chi_Minh
    ports:
      - '5432:5432'
    volumes:
      - system_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d system_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── System Service (.NET 9 + gRPC) ─────────────────────────────────────────
  system-service:
    build:
      context: .
      dockerfile: apps/system-service/Dockerfile
    container_name: foxai-system-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${SYSTEM_SERVICE_ENV:-Production}
      SYSTEM_DATABASE_URL: ${SYSTEM_DATABASE_URL_DOCKER}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: foxai-system-service
      Jwt__Audience: foxai-platform
      Jwt__ExpiresIn: ${JWT_EXPIRES_IN:-7d}
      GRPC_PORT: '50051'
      HTTP_PORT: '3002'
      SYSTEM_SERVICE_AUTOMIGRATE: 'true'
      SYSTEM_SERVICE_SEED: 'true'
    ports:
      - '51051:50051'
      - '3002:3002'
    depends_on:
      system-db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3002/health']
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ─── Knowledge Service (.NET 9 + gRPC) ──────────────────────────────────────
  knowledge-service:
    build:
      context: .
      dockerfile: apps/knowledge-service/Dockerfile
    container_name: foxai-knowledge-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${KNOWLEDGE_SERVICE_ENV:-Production}
      KNOWLEDGE_DATABASE_URL: ${KNOWLEDGE_DATABASE_URL_DOCKER}
      GRPC_PORT: '50052'
      HTTP_PORT: '3005'
      KNOWLEDGE_SERVICE_AUTOMIGRATE: 'true'
      KNOWLEDGE_SERVICE_SEED: 'true'
    ports:
      - '52052:50052'
      - '3005:3005'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3005/health']
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ─── OCR API (HTTP server + job producer) ───────────────────────────────────
  ocr-api:
    build:
      context: .
      dockerfile: apps/ocr-service/Dockerfile
    container_name: foxai-ocr-api
    restart: unless-stopped
    environment:
      APP_MODE: api
      NODE_ENV: production
      OCR_SERVICE_PORT: 3003
      OCR_DATABASE_URL: ${OCR_DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      BULLMQ_PREFIX: ocr
      OCR_PROVIDER: ${OCR_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      WORKER_CONCURRENCY: 3
      UPLOAD_DIR: /app/apps/ocr-service/uploads
    ports:
      - '${OCR_SERVICE_PORT:-3003}:3003'
    volumes:
      - ocr_uploads:/app/apps/ocr-service/uploads
    depends_on:
      redis:
        condition: service_healthy

  # ─── OCR Workers (job consumers, no HTTP) ────────────────────────────────────
  ocr-worker:
    build:
      context: .
      dockerfile: apps/ocr-service/Dockerfile
    restart: unless-stopped
    environment:
      APP_MODE: worker
      NODE_ENV: production
      OCR_DATABASE_URL: ${OCR_DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      BULLMQ_PREFIX: ocr
      OCR_PROVIDER: ${OCR_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      WORKER_CONCURRENCY: 15
      UPLOAD_DIR: /app/apps/ocr-service/uploads
    volumes:
      - ocr_uploads:/app/apps/ocr-service/uploads
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

  # ─── API Gateway (NestJS) ───────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: foxai-api-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_GATEWAY_PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SYSTEM_SERVICE_GRPC_URL: system-service:50051
      KNOWLEDGE_SERVICE_GRPC_URL: knowledge-service:50052
      OCR_SERVICE_URL: http://ocr-api:3003
      # Proxy targets cho Python chatbot/index service
      CHATBOT_SERVICE_URL: http://chatbot-service:8000
      INDEX_SERVICE_URL: http://index-service:8000
      JWT_ISSUER: foxai-system-service
      JWT_AUDIENCE: foxai-platform
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    ports:
      - '3001:3001'
    depends_on:
      system-service:
        condition: service_healthy
      knowledge-service:
        condition: service_healthy
      ocr-api:
        condition: service_started
      chatbot-service:
        condition: service_started
      index-service:
        condition: service_started
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3001/health']
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ─── Chatbot Python Postgres ────────────────────────────────────────────────
  # Riêng cho apps/chatbot-service (FastAPI). Schema do Alembic quản lý.
  chatbot-py-postgres:
    image: postgres:17.0-alpine
    container_name: foxai-chatbot-py-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatbot_py_db
      TZ: Asia/Ho_Chi_Minh
    ports:
      - '5436:5432'
    volumes:
      - chatbot_py_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d chatbot_py_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Index Python Postgres ──────────────────────────────────────────────────
  index-py-postgres:
    image: postgres:17.0-alpine
    container_name: foxai-index-py-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: index_py_db
      TZ: Asia/Ho_Chi_Minh
    ports:
      - '5437:5432'
    volumes:
      - index_py_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d index_py_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Qdrant (vector DB cho chatbot RAG + Mem0) ──────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: foxai-qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage

  # ─── MinIO (S3-compatible object storage cho file upload) ───────────────────
  minio:
    image: quay.io/minio/minio:latest
    container_name: foxai-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_password}
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Chatbot Migration Runner (chạy alembic upgrade rồi exit) ───────────────
  chatbot-py-migration:
    build:
      context: apps/chatbot-service
      dockerfile: Dockerfile.migration
    container_name: foxai-chatbot-py-migration
    restart: 'no'
    environment:
      POSTGRES__HOST: chatbot-py-postgres
      POSTGRES__PORT: 5432
      POSTGRES__USERNAME: postgres
      POSTGRES__PASSWORD: postgres
      POSTGRES__DB: chatbot_py_db
    depends_on:
      chatbot-py-postgres:
        condition: service_healthy

  # ─── Index Migration Runner ─────────────────────────────────────────────────
  index-py-migration:
    build:
      context: apps/index-service
      dockerfile: Dockerfile.migration
    container_name: foxai-index-py-migration
    restart: 'no'
    environment:
      POSTGRES__HOST: index-py-postgres
      POSTGRES__PORT: 5432
      POSTGRES__USERNAME: postgres
      POSTGRES__PASSWORD: postgres
      POSTGRES__DB: index_py_db
    depends_on:
      index-py-postgres:
        condition: service_healthy

  # ─── Chatbot Service (Python/FastAPI) ───────────────────────────────────────
  chatbot-service:
    build:
      context: apps/chatbot-service
      dockerfile: Dockerfile
    container_name: foxai-chatbot-service
    restart: unless-stopped
    env_file:
      - ./apps/chatbot-service/.env
    environment:
      # JWT shared with system-service .NET (HS256)
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: foxai-system-service
      JWT_AUDIENCE: foxai-platform
      # DB connection (overrides .env)
      POSTGRES__HOST: chatbot-py-postgres
      POSTGRES__PORT: 5432
      POSTGRES__USERNAME: postgres
      POSTGRES__PASSWORD: postgres
      POSTGRES__DB: chatbot_py_db
      # Forced to 1 worker — multi-worker fork-mode crashes due to DB/Redis/Qdrant pool exhaustion
      UVICORN_WORKERS: '1'
      # ROOT_PATH must match the gateway prefix so Swagger UI loads
      # /api/chatbot/openapi.json (and not /chatbot/openapi.json).
      ROOT_PATH: /api/chatbot
      EMBED_BASE_URL: ${EMBED_BASE_URL:-}
    ports:
      - '${CHATBOT_SERVICE_PORT:-3004}:8000'
    volumes:
      # Mount widget directory để host npm build → container serve realtime
      # mà không cần rebuild image. SDK build chạy trên host:
      #   cd apps/chatbot-service/widget/sdk && NODE_ENV=production npm run build
      - ./apps/chatbot-service/widget:/app/widget:ro
    depends_on:
      chatbot-py-postgres:
        condition: service_healthy
      chatbot-py-migration:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy

  # ─── Index Service (Python/FastAPI) ─────────────────────────────────────────
  # Lưu ý: dùng port host 3006 vì :3005 đã thuộc knowledge-service .NET.
  index-service:
    build:
      context: apps/index-service
      dockerfile: Dockerfile
    container_name: foxai-index-py-service
    restart: unless-stopped
    env_file:
      - ./apps/index-service/.env
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: foxai-system-service
      JWT_AUDIENCE: foxai-platform
      POSTGRES__HOST: index-py-postgres
      POSTGRES__PORT: 5432
      POSTGRES__USERNAME: postgres
      POSTGRES__PASSWORD: postgres
      POSTGRES__DB: index_py_db
      # Match the gateway prefix so Swagger UI works through the gateway.
      ROOT_PATH: /api/index
    ports:
      - '${INDEX_PY_SERVICE_PORT:-3006}:8000'
    depends_on:
      index-py-postgres:
        condition: service_healthy
      index-py-migration:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Web Portal (Next.js) ───────────────────────────────────────────────────
  # NEXT_PUBLIC_API_URL phải là URL mà browser có thể reach được (IP/domain công khai).
  web-portal:
    build:
      context: .
      dockerfile: apps/web-portal/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: foxai-web-portal
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  redis_data:
  ocr_uploads:
  chatbot_py_db_data:
  index_py_db_data:
  qdrant_data:
  minio_data:
  system_db_data:
