services:
  # ─── System DB ──────────────────────────────────────────────────────────────
  system-db:
    image: postgres:16-alpine
    container_name: foxai-system-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: YdESBSZ@1%a22
      POSTGRES_DB: system_db
    ports:
      - '5432:5432'
    volumes:
      - system_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d system_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── OCR DB (pgvector) ──────────────────────────────────────────────────────
  ocr-db:
    image: pgvector/pgvector:pg16
    container_name: foxai-ocr-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ocr_user
      POSTGRES_PASSWORD: ocr_pass
      POSTGRES_DB: ocr_db
    ports:
      - '5433:5432'
    volumes:
      - ocr_db_data:/var/lib/postgresql/data
      - ./scripts/init-ocr-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ocr_user -d ocr_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Chatbot DB (pgvector) ──────────────────────────────────────────────────
  chatbot-db:
    image: pgvector/pgvector:pg16
    container_name: foxai-chatbot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatbot_user
      POSTGRES_PASSWORD: chatbot_pass
      POSTGRES_DB: chatbot_db
    ports:
      - '5434:5432'
    volumes:
      - chatbot_db_data:/var/lib/postgresql/data
      - ./scripts/init-chatbot-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chatbot_user -d chatbot_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── System Service (.NET 9 + gRPC) ─────────────────────────────────────────
  system-service:
    build:
      context: .
      dockerfile: apps/system-service/Dockerfile
    container_name: foxai-system-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${SYSTEM_SERVICE_ENV:-Production}
      SYSTEM_DATABASE_URL: postgresql://myuser:mypassword@system-db:5432/system_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-a-long-random-string-32+}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      Jwt__Secret: ${JWT_SECRET:-change-me-in-production-use-a-long-random-string-32+}
      Jwt__Issuer: foxai-system-service
      Jwt__Audience: foxai-platform
      Jwt__ExpiresIn: ${JWT_EXPIRES_IN:-7d}
      GRPC_PORT: '50051'
      HTTP_PORT: '3002'
      SYSTEM_SERVICE_AUTOMIGRATE: 'true'
      SYSTEM_SERVICE_SEED: 'true'
    # Host port 51051 because Windows often reserves 49960-50059 for HyperV/WSL2.
    # Container-to-container traffic uses internal 50051.
    ports:
      - '51051:50051'
      - '3002:3002'
    depends_on:
      system-db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3002/health']
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ─── Redis (BullMQ) ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: foxai-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── OCR API (HTTP server + job producer) ───────────────────────────────────
  ocr-api:
    build:
      context: .
      dockerfile: apps/ocr-service/Dockerfile
    container_name: foxai-ocr-api
    restart: unless-stopped
    environment:
      APP_MODE: api
      NODE_ENV: production
      OCR_SERVICE_PORT: 3003
      OCR_DATABASE_URL: postgresql://ocr_user:ocr_pass@ocr-db:5432/ocr_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      BULLMQ_PREFIX: ocr
      OCR_PROVIDER: ${OCR_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      WORKER_CONCURRENCY: 3
      UPLOAD_DIR: ./uploads
    ports:
      - '${OCR_SERVICE_PORT:-3003}:3003'
    volumes:
      - ocr_uploads:/app/apps/ocr-service/uploads
    depends_on:
      ocr-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── OCR Workers (job consumers, no HTTP) ────────────────────────────────────
  ocr-worker:
    build:
      context: .
      dockerfile: apps/ocr-service/Dockerfile
    restart: unless-stopped
    environment:
      APP_MODE: worker
      NODE_ENV: production
      OCR_DATABASE_URL: postgresql://ocr_user:ocr_pass@ocr-db:5432/ocr_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      BULLMQ_PREFIX: ocr
      OCR_PROVIDER: ${OCR_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      WORKER_CONCURRENCY: 15
      UPLOAD_DIR: ./uploads
    volumes:
      - ocr_uploads:/app/apps/ocr-service/uploads
    depends_on:
      ocr-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

  # ─── Chatbot stack (Python/FastAPI — replaces the NestJS chatbot-service scaffold) ──
  # Two Python services + their own datastores. JWT comes from system-service
  # via shared JWT_SECRET (see apps/chatbot-service/api/helpers/dependencies/shared_auth.py).

  chatbot-py-postgres:
    image: postgres:17.0-alpine
    container_name: foxai-chatbot-py-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatbot_py_db
      TZ: Asia/Ho_Chi_Minh
    ports:
      - '5436:5432'
    volumes:
      - chatbot_py_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d chatbot_py_db']
      interval: 10s
      timeout: 5s
      retries: 5

  index-py-postgres:
    image: postgres:17.0-alpine
    container_name: foxai-index-py-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: index_py_db
      TZ: Asia/Ho_Chi_Minh
    ports:
      - '5435:5432'
    volumes:
      - index_py_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d index_py_db']
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: foxai-qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'  # HTTP
      - '6334:6334'  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: quay.io/minio/minio:latest
    container_name: foxai-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_password
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3

  chatbot-py-migration:
    build:
      context: apps/chatbot-service
      dockerfile: Dockerfile.migration
    container_name: foxai-chatbot-py-migration
    restart: 'no'
    environment:
      POSTGRES__HOST: chatbot-py-postgres
      POSTGRES__PORT: 5432
      POSTGRES__USERNAME: postgres
      POSTGRES__PASSWORD: postgres
      POSTGRES__DB: chatbot_py_db
    depends_on:
      chatbot-py-postgres:
        condition: service_healthy

  index-py-migration:
    build:
      context: apps/index-service
      dockerfile: Dockerfile.migration
    container_name: foxai-index-py-migration
    restart: 'no'
    environment:
      POSTGRES__HOST: index-py-postgres
      POSTGRES__PORT: 5432
      POSTGRES__USERNAME: postgres
      POSTGRES__PASSWORD: postgres
      POSTGRES__DB: index_py_db
    depends_on:
      index-py-postgres:
        condition: service_healthy

  chatbot-service:
    build:
      context: apps/chatbot-service
      dockerfile: Dockerfile
    container_name: foxai-chatbot-service
    restart: unless-stopped
    environment:
      # JWT shared with system-service (HS256)
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-a-long-random-string-32+}
      JWT_ISSUER: foxai-system-service
      JWT_AUDIENCE: foxai-platform
      # DB
      POSTGRES__HOST: chatbot-py-postgres
      POSTGRES__PORT: 5432
      POSTGRES__USERNAME: postgres
      POSTGRES__PASSWORD: postgres
      POSTGRES__DB: chatbot_py_db
      # Embed snippet base URL (used by /v1/chatbots/{id}/embed-snippet)
      EMBED_BASE_URL: ${EMBED_BASE_URL:-}
      # Single-worker is mandatory unless you raise the DB/Redis/Qdrant pool sizes;
      # see comment in apps/chatbot-service/main.py.
      UVICORN_WORKERS: '1'
      ROOT_PATH: /chatbot
    env_file:
      - ${CHATBOT_SERVICE_ENV_FILE:-./apps/chatbot-service/.env}
    ports:
      - '${CHATBOT_SERVICE_PORT:-3004}:8000'
    depends_on:
      chatbot-py-postgres:
        condition: service_healthy
      chatbot-py-migration:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy

  index-service:
    build:
      context: apps/index-service
      dockerfile: Dockerfile
    container_name: foxai-index-py-service
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-a-long-random-string-32+}
      JWT_ISSUER: foxai-system-service
      JWT_AUDIENCE: foxai-platform
      POSTGRES__HOST: index-py-postgres
      POSTGRES__PORT: 5432
      POSTGRES__USERNAME: postgres
      POSTGRES__PASSWORD: postgres
      POSTGRES__DB: index_py_db
      ROOT_PATH: /index
    env_file:
      - ${INDEX_SERVICE_ENV_FILE:-./apps/index-service/.env}
    ports:
      - '${INDEX_SERVICE_PORT:-3005}:8000'
    depends_on:
      index-py-postgres:
        condition: service_healthy
      index-py-migration:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  system_db_data:
  ocr_db_data:
  chatbot_db_data:
  redis_data:
  ocr_uploads:
  chatbot_py_db_data:
  index_py_db_data:
  qdrant_data:
  minio_data:
