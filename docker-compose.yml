services:
  # ─── Redis (BullMQ) ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: foxai-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── System Service (.NET 9 + gRPC) ─────────────────────────────────────────
  system-service:
    build:
      context: .
      dockerfile: apps/system-service/Dockerfile
    container_name: foxai-system-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${SYSTEM_SERVICE_ENV:-Production}
      SYSTEM_DATABASE_URL: ${SYSTEM_DATABASE_URL_DOCKER}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: foxai-system-service
      Jwt__Audience: foxai-platform
      Jwt__ExpiresIn: ${JWT_EXPIRES_IN:-7d}
      GRPC_PORT: '50051'
      HTTP_PORT: '3002'
      SYSTEM_SERVICE_AUTOMIGRATE: 'true'
      SYSTEM_SERVICE_SEED: 'true'
    ports:
      - '51051:50051'
      - '3002:3002'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3002/health']
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ─── Knowledge Service (.NET 9 + gRPC) ──────────────────────────────────────
  knowledge-service:
    build:
      context: .
      dockerfile: apps/knowledge-service/Dockerfile
    container_name: foxai-knowledge-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${KNOWLEDGE_SERVICE_ENV:-Production}
      KNOWLEDGE_DATABASE_URL: ${KNOWLEDGE_DATABASE_URL_DOCKER}
      GRPC_PORT: '50052'
      HTTP_PORT: '3005'
      KNOWLEDGE_SERVICE_AUTOMIGRATE: 'true'
      KNOWLEDGE_SERVICE_SEED: 'true'
    ports:
      - '52052:50052'
      - '3005:3005'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3005/health']
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ─── OCR DB (pgvector) ──────────────────────────────────────────────────────
  ocr-db:
    image: pgvector/pgvector:pg16
    container_name: foxai-ocr-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${OCR_DB_USER:-ocr_user}
      POSTGRES_PASSWORD: ${OCR_DB_PASSWORD:-ocr_pass}
      POSTGRES_DB: ${OCR_DB_NAME:-ocr_db}
    ports:
      - '5434:5432'
    volumes:
      - ocr_db_data:/var/lib/postgresql/data
      - ./scripts/init-ocr-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${OCR_DB_USER:-ocr_user} -d ${OCR_DB_NAME:-ocr_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── OCR API (HTTP server + job producer) ───────────────────────────────────
  ocr-api:
    build:
      context: .
      dockerfile: apps/ocr-service/Dockerfile
    container_name: foxai-ocr-api
    restart: unless-stopped
    environment:
      APP_MODE: api
      NODE_ENV: production
      OCR_SERVICE_PORT: 3003
      OCR_DATABASE_URL: postgresql://${OCR_DB_USER:-ocr_user}:${OCR_DB_PASSWORD:-ocr_pass}@ocr-db:5432/${OCR_DB_NAME:-ocr_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      BULLMQ_PREFIX: ocr
      OCR_PROVIDER: ${OCR_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      WORKER_CONCURRENCY: 3
      UPLOAD_DIR: ./uploads
    ports:
      - '${OCR_SERVICE_PORT:-3003}:3003'
    volumes:
      - ocr_uploads:/app/apps/ocr-service/uploads
    depends_on:
      redis:
        condition: service_healthy
      ocr-db:
        condition: service_healthy

  # ─── OCR Workers (job consumers, no HTTP) ────────────────────────────────────
  ocr-worker:
    build:
      context: .
      dockerfile: apps/ocr-service/Dockerfile
    restart: unless-stopped
    environment:
      APP_MODE: worker
      NODE_ENV: production
      OCR_DATABASE_URL: postgresql://${OCR_DB_USER:-ocr_user}:${OCR_DB_PASSWORD:-ocr_pass}@ocr-db:5432/${OCR_DB_NAME:-ocr_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      BULLMQ_PREFIX: ocr
      OCR_PROVIDER: ${OCR_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      WORKER_CONCURRENCY: 15
      UPLOAD_DIR: ./uploads
    volumes:
      - ocr_uploads:/app/apps/ocr-service/uploads
    depends_on:
      redis:
        condition: service_healthy
      ocr-db:
        condition: service_healthy
    deploy:
      replicas: 2

  # ─── API Gateway (NestJS) ───────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: foxai-api-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_GATEWAY_PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SYSTEM_SERVICE_GRPC_URL: system-service:50051
      KNOWLEDGE_SERVICE_GRPC_URL: knowledge-service:50052
      OCR_SERVICE_URL: http://ocr-api:3003
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    ports:
      - '3001:3001'
    depends_on:
      system-service:
        condition: service_healthy
      knowledge-service:
        condition: service_healthy
      ocr-api:
        condition: service_started
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3001/health']
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ─── Web Portal (Next.js) ───────────────────────────────────────────────────
  # NEXT_PUBLIC_API_URL phải là URL mà browser có thể reach được (IP/domain công khai).
  web-portal:
    build:
      context: .
      dockerfile: apps/web-portal/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: foxai-web-portal
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  redis_data:
  ocr_db_data:
  ocr_uploads:
