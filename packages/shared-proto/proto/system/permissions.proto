syntax = "proto3";

package foxai.system;

option csharp_namespace = "Foxai.System.V1";

service PermissionsService {
  rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse);
  rpc GetPermission(GetPermissionRequest) returns (PermissionDto);
}

message PermissionDto {
  string id = 1;
  string code = 2;
  string name = 3;
  string module = 4;
  string action = 5;
  string resource = 6;
}

message ListPermissionsRequest {
  optional string module = 1;
}

message ListPermissionsResponse {
  repeated PermissionDto items = 1;
}

message GetPermissionRequest {
  string id = 1;
}
