syntax = "proto3";

package foxai.system;

import "common/pagination.proto";

option csharp_namespace = "Foxai.System.V1";

service PermissionActionsService {
  rpc ListPermissionActions(ListPermissionActionsRequest) returns (ListPermissionActionsResponse);
  rpc GetPermissionAction(GetPermissionActionRequest) returns (PermissionActionDto);
  rpc CreatePermissionAction(CreatePermissionActionRequest) returns (PermissionActionDto);
  rpc UpdatePermissionAction(UpdatePermissionActionRequest) returns (PermissionActionDto);
  rpc DeletePermissionAction(DeletePermissionActionRequest) returns (foxai.common.EmptyResponse);
}

message PermissionActionDto {
  string id = 1;
  string code = 2;
  string name = 3;
  optional string description = 4;
  int32 sort_order = 5;
  bool is_active = 6;
  string created_at = 7;
  string updated_at = 8;
}

message ListPermissionActionsRequest { bool active_only = 1; }
message ListPermissionActionsResponse { repeated PermissionActionDto items = 1; }

message GetPermissionActionRequest { string id = 1; }
message DeletePermissionActionRequest { string id = 1; }

message CreatePermissionActionRequest {
  string code = 1;
  string name = 2;
  optional string description = 3;
  int32 sort_order = 4;
}

message UpdatePermissionActionRequest {
  string id = 1;
  optional string name = 2;
  optional string description = 3;
  optional int32 sort_order = 4;
  optional bool is_active = 5;
}
