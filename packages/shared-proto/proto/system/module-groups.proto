syntax = "proto3";

package foxai.system;

import "common/pagination.proto";
import "system/modules.proto";

option csharp_namespace = "Foxai.System.V1";

service ModuleGroupsService {
  rpc ListModuleGroups(ListModuleGroupsRequest) returns (ListModuleGroupsResponse);
  rpc GetModuleGroup(GetModuleGroupRequest) returns (ModuleGroupDto);
  rpc CreateModuleGroup(CreateModuleGroupRequest) returns (ModuleGroupDto);
  rpc UpdateModuleGroup(UpdateModuleGroupRequest) returns (ModuleGroupDto);
  rpc DeleteModuleGroup(DeleteModuleGroupRequest) returns (foxai.common.EmptyResponse);
}

message ModuleGroupDto {
  string id = 1;
  string code = 2;
  string name = 3;
  optional string description = 4;
  int32 sort_order = 5;
  bool is_active = 6;
  repeated ModuleSummaryDto modules = 7;
  string created_at = 8;
  string updated_at = 9;
}

message ModuleSummaryDto {
  string id = 1;
  string code = 2;
  string name = 3;
  int32 sort_order = 4;
  bool is_active = 5;
  repeated ModuleAllowedActionDto allowed_actions = 6;
}

message ListModuleGroupsRequest { bool active_only = 1; }
message ListModuleGroupsResponse { repeated ModuleGroupDto items = 1; }

message GetModuleGroupRequest { string id = 1; }
message DeleteModuleGroupRequest { string id = 1; }

message CreateModuleGroupRequest {
  string code = 1;
  string name = 2;
  optional string description = 3;
  int32 sort_order = 4;
}

message UpdateModuleGroupRequest {
  string id = 1;
  optional string name = 2;
  optional string description = 3;
  optional int32 sort_order = 4;
  optional bool is_active = 5;
}
